# ============================================================================
# Deployment
# ============================================================================
# Manages replicas of your app. Deployment creates ReplicaSets, which create
# Pods. Deployment handles rolling updates, scaling, and rollback.
#
# TODO: Customize image, replicas, resource limits, and probe settings

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  namespace: myapp-production
  labels:
    app: myapp
    version: v1
spec:
  # TODO: Set replica count (number of pod instances)
  # Increasing replicas = horizontal scaling
  # K8s automatically load-balances traffic across replicas
  replicas: 3

  # Selector: Deployment manages pods with matching labels
  selector:
    matchLabels:
      app: myapp

  # Strategy for updating (rolling updates with zero downtime)
  strategy:
    type: RollingUpdate
    # TODO: Customize rolling update parameters
    rollingUpdate:
      maxSurge: 1        # Extra pods allowed during update (1 = 25% if replicas=4)
      maxUnavailable: 0  # Pods that can be unavailable during update
      # Set maxUnavailable=0 for zero downtime (requires maxSurge > 0)

  # Template defines pod specifications
  template:
    metadata:
      labels:
        app: myapp
        version: v1
      # TODO: Add annotations for monitoring/logging
      # annotations:
      #   prometheus.io/scrape: "true"
      #   prometheus.io/port: "8080"
    spec:
      # Restart policy: what happens if container crashes
      restartPolicy: Always  # Always restart failed containers
      # TODO: Other options:
      #   OnFailure: only restart on non-zero exit code
      #   Never: don't auto-restart

      # ServiceAccount: permissions for this pod
      serviceAccountName: default
      # TODO: Create a custom ServiceAccount with specific RBAC rules if needed

      # Pod-level resource limits
      # TODO: Set these based on your app's needs
      # resources:
      #   requests:
      #     memory: "64Mi"
      #     cpu: "100m"
      #   limits:
      #     memory: "128Mi"
      #     cpu: "200m"

      # Container specification
      containers:
        # TODO: Replace "myapp" with your container name
        - name: myapp

          # TODO: Replace with your image
          # Format: [registry]/[namespace]/[image]:[tag]
          # Example: docker.io/mycompany/myapp:v1.0.0
          image: docker.io/mycompany/myapp:latest

          # Image pull policy
          imagePullPolicy: IfNotPresent  # Pull if not already present
          # TODO: Change to "Always" for latest version on every deploy
          # Or "Never" if using local images only

          # Container port
          ports:
            - containerPort: 8080  # TODO: Change to your app's port
              protocol: TCP
              name: http
              # TODO: Add more ports if needed (e.g., metrics, debug)
              # - containerPort: 9090
              #   protocol: TCP
              #   name: metrics

          # Environment variables from ConfigMap and Secret
          env:
            # TODO: Add env vars from ConfigMap
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: myapp-config
                  key: APP_NAME
            
            # TODO: Add env vars from Secret
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myapp-secrets
                  key: DATABASE_PASSWORD

            # TODO: Direct environment variables
            - name: ENVIRONMENT
              value: "production"

          # TODO: Mount ConfigMap as a file (optional)
          # volumeMounts:
          #   - name: config-volume
          #     mountPath: /etc/config

          # TODO: Mount PersistentVolume (optional, if using storage)
          # volumeMounts:
          #   - name: data-volume
          #     mountPath: /data

          # Liveness probe: Is the container alive?
          # Restart if probe fails
          livenessProbe:
            httpGet:
              path: /health  # TODO: Change to your health check endpoint
              port: 8080     # TODO: Change to your container port
            initialDelaySeconds: 10  # Wait before first check
            periodSeconds: 10        # Check every 10 seconds
            timeoutSeconds: 3        # Timeout per check
            failureThreshold: 3      # Fail after 3 consecutive failures
            # TODO: Alternative: exec command instead of HTTP
            # exec:
            #   command:
            #     - /bin/sh
            #     - -c
            #     - "test -f /tmp/healthy"

          # Readiness probe: Is the container ready for traffic?
          # Remove from load balancer if probe fails
          readinessProbe:
            httpGet:
              path: /ready   # TODO: Change to your readiness endpoint
              port: 8080     # TODO: Change to your container port
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
            # TODO: Alternative: exec command
            # exec:
            #   command:
            #     - /bin/sh
            #     - -c
            #     - "curl -f http://localhost:8080/ready || exit 1"

          # Resource requests and limits
          # TODO: Set based on your app's needs
          resources:
            requests:
              memory: "128Mi"     # TODO: Minimum memory needed
              cpu: "100m"         # TODO: Minimum CPU (1000m = 1 core)
            limits:
              memory: "256Mi"     # TODO: Maximum memory allowed
              cpu: "500m"         # TODO: Maximum CPU

          # TODO: Security context (run as specific user, read-only filesystem)
          # securityContext:
          #   runAsNonRoot: true
          #   runAsUser: 1000
          #   readOnlyRootFilesystem: true

      # TODO: Volumes (if using ConfigMap mounts or PersistentVolumes)
      # volumes:
      #   - name: config-volume
      #     configMap:
      #       name: myapp-config
      #   - name: data-volume
      #     persistentVolumeClaim:
      #       claimName: myapp-pvc


# ============================================================================
# Service
# ============================================================================
# Exposes pods to network. Creates stable DNS names and load balances traffic
# across pod replicas.
#
# TODO: Choose Service type and customize ports

---
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  namespace: myapp-production
  labels:
    app: myapp
spec:
  # Service type:
  # TODO: Choose one:
  # - ClusterIP: Internal DNS only (default, no external access)
  # - NodePort: Accessible via node IP on a specific port
  # - LoadBalancer: Cloud provider load balancer (external IP)
  # - ExternalName: Maps to external DNS name
  type: ClusterIP

  # Selector: Which pods does this service route traffic to?
  # Must match deployment pod labels
  selector:
    app: myapp

  # Ports
  ports:
    # TODO: Change port/targetPort to match your app
    - name: http
      port: 80              # External port (via service)
      targetPort: 8080      # Container port
      protocol: TCP
      # nodePort: 30080     # TODO: For NodePort type only
    
    # TODO: Add more ports if needed
    # - name: metrics
    #   port: 9090
    #   targetPort: 9090

  # Session affinity (sticky sessions)
  sessionAffinity: None
  # TODO: Change to "ClientIP" for sticky sessions (requests from same client go to same pod)


