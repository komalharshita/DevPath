# kubernetes_manager.yaml
# =======================
# Project:    Kubernetes Deployment & Service Configuration
# Difficulty: Advanced
# Skills:     Kubernetes, YAML, Docker, Linux, kubectl
# Time:       High (7-10 days)
#
# What you will build:
#     A complete Kubernetes (K8s) deployment manifest that orchestrates
#     containerised applications. You will define Deployments (manages
#     app replicas), Services (networking), ConfigMaps (configuration),
#     Secrets (sensitive data), Persistent Volumes (data storage), and
#     resource limits/requests. This teaches infrastructure as code (IaC)
#     and modern DevOps practices.
#
#     Kubernetes manages containerised apps at scale: auto-restarts
#     failed containers, load balances traffic, rolls out updates with
#     zero downtime, and scales horizontally (more replicas on demand).
#
# How to use:
#     1. Install kubectl: https://kubernetes.io/docs/tasks/tools/
#     2. Have access to a Kubernetes cluster (local minikube or cloud)
#     3. Update values in this file (image name, replicas, etc.)
#     4. Deploy: kubectl apply -f kubernetes_manager.yaml
#     5. Monitor: kubectl get pods, kubectl logs <pod-name>
#
# Learning goals:
#     - Understanding Kubernetes objects (Pod, Deployment, Service, etc.)
#     - Writing declarative infrastructure (YAML manifests)
#     - Configuring containerised apps in K8s
#     - Managing networking and service discovery
#     - Handling configuration (ConfigMaps) and secrets
#     - Resource management and auto-scaling
#     - Rolling updates and rollback strategies
#     - Monitoring logs and debugging pods
#
# Key concept — Kubernetes in plain English:
#     Without Kubernetes (manual approach):
#         - You rent VMs, SSH in, and start Docker containers by hand
#         - If container crashes, you don't notice until users complain
#         - Scaling up means manually starting more containers
#         - Deploying new versions requires downtime or careful manual steps
#
#     With Kubernetes:
#         - You declare desired state in YAML ("I want 3 replicas of app")
#         - K8s automatically achieves it (starts/stops containers as needed)
#         - If a pod crashes, K8s instantly restarts it
#         - Scaling: 1 command to change replica count
#         - Rolling updates: Replace old pods with new ones gracefully
#         - Self-healing, auto-scaling, load-balanced networking
#
# Kubernetes objects used here:
#     - Namespace: Logical grouping (isolate environments)
#     - ConfigMap: Non-sensitive configuration (env vars, config files)
#     - Secret: Sensitive data (passwords, API keys, certs)
#     - Deployment: Manages replicas of your app (scaling, updates)
#     - Service: Exposes pods to network (load balancing, DNS)
#     - PersistentVolume: Storage resource
#     - PersistentVolumeClaim: Request for storage
#     - Ingress: HTTP(S) routing (optional, more advanced)
#
# Manifest flow:
#     kubectl apply -f kubernetes_manager.yaml
#         |
#         v
#     Kubernetes API receives manifest
#         |
#         v
#     Create Namespace
#         |
#         v
#     Create ConfigMap (app configuration)
#         |
#         v
#     Create Secret (passwords, API keys)
#         |
#         v
#     Create PersistentVolume (optional storage)
#         |
#         v
#     Create PersistentVolumeClaim (optional storage request)
#         |
#         v
#     Create Deployment (manages pods)
#         - K8s scheduler places pods on nodes
#         - Container runtime pulls image and starts containers
#         |
#         v
#     Create Service (networking)
#         - Creates internal DNS name
#         - Sets up load balancer
#         |
#         v
#     Pods start receiving traffic via Service
#
# Roadmap:
#     Step 1:  Understand Kubernetes concepts and YAML syntax
#     Step 2:  Install kubectl and access a cluster
#     Step 3:  Define Namespace and metadata
#     Step 4:  Complete ConfigMap (configuration)
#     Step 5:  Complete Secret (sensitive data)
#     Step 6:  Complete PersistentVolume and PersistentVolumeClaim
#     Step 7:  Complete Deployment (pod management, replicas, updates)
#     Step 8:  Complete Service (networking and load balancing)
#     Step 9:  Deploy and test with kubectl apply
#     Step 10: Monitor and debug with kubectl logs, exec, describe

# ============================================================================
# NAMESPACE
# ============================================================================
# Namespaces logically partition a cluster.
# Best practice: separate prod, staging, dev environments into different
# namespaces for isolation, resource quotas, and access control.
#
# TODO: Choose a namespace name for your environment (e.g., prod, staging, dev)

apiVersion: v1
kind: Namespace
metadata:
  name: myapp-production  # TODO: Change to your namespace name
  # Optional: Add labels for organization
  labels:
    environment: production
    team: backend


# ============================================================================
# ConfigMap
# ============================================================================
# Store non-sensitive configuration (app settings, feature flags, etc.)
# Changes require pod restart (unlike Secrets which can be hot-reloaded).
#
# TODO: Add your app's configuration values

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-config
  namespace: myapp-production
data:
  # TODO: Add key-value configuration for your app
  # Example:
  APP_NAME: "MyApp"
  LOG_LEVEL: "info"
  DATABASE_HOST: "postgres.myapp-production.svc.cluster.local"
  DATABASE_PORT: "5432"
  API_TIMEOUT: "30"
  
  # TODO: You can also store entire config files
  # app.conf: |
  #   server {
  #       listen 8080;
  #       access_log /var/log/nginx/access.log;
  #   }

  # TODO: Environment-specific settings
  # FEATURE_BETA: "false"
  # CACHE_TTL: "3600"


# ============================================================================
# Secret
# ============================================================================
# Store sensitive data: passwords, API keys, certificates.
# Base64-encoded (NOT encrypted by default — use external secret management
# in production).
#
# WARNING: Secrets are NOT automatically encrypted. For sensitive data:
# - Use external secret management (HashiCorp Vault, AWS Secrets Manager)
# - Enable encryption at rest in your cluster
# - Restrict RBAC access to secrets
#
# TODO: Replace dummy values with real secrets (or use external secret store)

---
apiVersion: v1
kind: Secret
metadata:
  name: myapp-secrets
  namespace: myapp-production
  # TODO: Add labels for organisation
  labels:
    app: myapp
type: Opaque  # Generic key-value secret
data:
  # TODO: Base64-encode your secrets:
  # echo -n "my-password" | base64
  # Output: bXktcGFzc3dvcmQ=
  
  # Replace these with your actual secrets:
  DATABASE_PASSWORD: "cGFzc3dvcmQxMjM="  # TODO: base64("password123")
  DATABASE_USER: "ZGJfdXNlcg=="  # TODO: base64("db_user")
  API_KEY: "YWJjZGVmZ2hpamtsbW5vcA=="  # TODO: base64("your-api-key")
  # TODO: Add more secrets as needed

# Alternative: Use stringData (auto base64-encoded)
# stringData:
#   DATABASE_PASSWORD: "password123"  # TODO: Replace with actual


