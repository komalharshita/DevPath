# ============================================================================
# TODO DEPLOYMENT CHECKLIST
# ============================================================================
#
# Before deploying to production:
#
# [ ] 1. Update namespace name (line ~30)
# [ ] 2. Create ConfigMap with your app's configuration
# [ ] 3. Create Secret with sensitive data (or use external secret store)
# [ ] 4. Update Docker image name and tag (line ~180)
# [ ] 5. Set resource requests/limits based on your app (line ~220-225)
# [ ] 6. Update probe paths (/health, /ready) to match your app (line ~200, 209)
# [ ] 7. Set correct container port (line ~175)
# [ ] 8. Update Service port/targetPort (line ~270-271)
# [ ] 9. Choose Service type (ClusterIP vs NodePort vs LoadBalancer)
# [ ] 10. Test locally with minikube:
#         minikube start
#         kubectl apply -f kubernetes_manager.yaml
#         kubectl get pods -n myapp-production
#         kubectl logs -n myapp-production deployment/myapp-deployment
# [ ] 11. Test rolling updates by changing image tag:
#         kubectl set image deployment/myapp-deployment \
#           myapp=docker.io/mycompany/myapp:v2 -n myapp-production
# [ ] 12. Set up monitoring (Prometheus) and logging (Loki/ELK)
# [ ] 13. Configure Ingress for HTTP(S) routing (if needed)
# [ ] 14. Set up RBAC (role-based access control)
# [ ] 15. Test disaster recovery (pod failures, node failures)
#
# Useful kubectl commands:
#
# # Deploy
# kubectl apply -f kubernetes_manager.yaml
#
# # View resources
# kubectl get all -n myapp-production
# kubectl describe deployment myapp-deployment -n myapp-production
#
# # Logs
# kubectl logs deployment/myapp-deployment -n myapp-production -f
# kubectl logs -n myapp-production pod/myapp-deployment-abc123
#
# # Debug pod
# kubectl exec -it -n myapp-production deployment/myapp-deployment -- /bin/bash
#
# # Scaling
# kubectl scale deployment myapp-deployment --replicas=5 -n myapp-production
#
# # Rolling update
# kubectl set image deployment/myapp-deployment \
#   myapp=docker.io/mycompany/myapp:v2 -n myapp-production
#
# # Rollback
# kubectl rollout undo deployment/myapp-deployment -n myapp-production
#
# # Delete
# kubectl delete namespace myapp-production
